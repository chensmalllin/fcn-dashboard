<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFE57A"/>
      <stop offset="45%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6000"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1C2340"/>
      <stop offset="100%" stop-color="#0D1220"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- F shape (stem + top bar + middle bar) -->
  <rect x="7"  y="6"  width="4"  height="20" rx="1" fill="url(#gold)"/>
  <rect x="7"  y="6"  width="18" height="4"  rx="1" fill="url(#gold)"/>
  <rect x="7"  y="14" width="13" height="4"  rx="1" fill="url(#gold)"/>

  <!-- Subtle inner highlight on top bar -->
  <rect x="7" y="6" width="18" height="1.5" rx="0.75" fill="#FFF0A0" opacity="0.4"/>
</svg>
