[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/price"
  to = "/.netlify/functions/price"
  status = 200

[[redirects]]
  from = "/api/historical"
  to = "/.netlify/functions/historical"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
